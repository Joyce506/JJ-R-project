 <!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <title>JJR Restaurant | Sign Up</title>
    
    <style>
    

        body {
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            background-color: var(--bg-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
    color: #d63351;
background-color: #fbeff1;
        }
 header {
    display: flex;
    justify-content: center;
    padding: 20px 0;
}


.top-logo {
    width: 180px;
    height: auto;
    display: block;

}


header{display: flex;
    justify-content: center;
    padding: 20px;
}
.card { background: rgb(255,255,255);
            width: auto;
            max-width: 400px;
            padding:20px;
            border-radius: 20px;
            box-shadow: 10px 10 30 10;
            margin: auto;
            justify-content: center;}
        h2 {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 12px;
            margin: 8px 6px;
            border: 1.5px solid #ffdae2;
            border-radius: 20px;
            background-color: #fff9fa;
            font-family: 'Poppins', sans-serif;
            outline: none;
            box-sizing: border-box;
        }
        textarea {
            height: 70px;
            resize: none;
        }

        .gender-box {
            margin: 15px 0;
            text-align:center;
        }

        .gender-options {
            display:flex
        ;
            gap: 20px;
            margin: 5px;
        }

        .btn {
            background-color: #e64a67;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #d63351;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="JJ'R Logo" class="top-logo">
    
    </header>

    <div class="card">
    <div class="login-form">

    </div>
    <div class="card">
        <h2>Create Account</h2>
        <form>
            <div class="input-row">
                <input type="text" placeholder="First Name" required>
                <input type="text" placeholder="Last Name" required>
            </div>

            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>

            <input type="text" placeholder="City" required>
            <textarea placeholder="Full Address Details"></textarea>

            <div class="gender-box">
                <span style="font-weight: 600; font-size: 0.9rem;">Gender:</span><div class="gender-options">
                    <label style="font-size: 0.9rem;"><input type="radio" name="gender"> Female</label>
                    <label style="font-size: 0.9rem;"><input type="radio" name="gender"> Male</label>
                         <label style="font-size: 0.9rem;"><input type="radio" name="gender"> Engineer</label>
                </div>
            </div>

           <button class="btn" type="button" onclick="window.location.href='mainpage.html'">Register</button>
        </form>
    </div>

</body>
</html>
